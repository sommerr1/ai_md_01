<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Save AI Mode chat</title>
  <link rel="stylesheet" href="./popup.css" />
</head>
<body>
  <main>
    <header class="header">
      <p id="status">Проверка…</p>
      <button id="btn-settings" type="button" class="icon-btn" title="Настройки" aria-expanded="false" aria-controls="settings-panel">⚙</button>
    </header>

    <div id="settings-panel" class="hidden" role="region" aria-label="Настройки">
      <p id="folder-status" class="muted">Папка не выбрана</p>
      <button id="btn-pick-folder" type="button">Изменить папку</button>
    </div>

    <label id="filename-label" for="filename-input">Имя файла</label>
    <input id="filename-input" type="text" maxlength="80" />

    <div id="actions">
      <button id="btn-save" type="button" disabled>Сохранить</button>
    </div>

    <div id="spinner" class="hidden" aria-live="polite">Сохранение…</div>
    <p id="error" class="error hidden" role="alert"></p>
    <p id="success" class="success hidden" role="status"></p>
  </main>
  <script type="module" src="./popup.ts"></script>
</body>
</html>
